<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Social Media Meta Information -->
    <meta property="og:title" content="Swamp Beast Diplomat Character Card">
    <meta property="og:description" content="A character card demonstrating JavaScript objects and methods.">
    <meta property="og:image" content="Images/swampbeast.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://joshbot8.github.io/wdd131/charactercard/index.html">

    <meta name="twitter:title" content="Swamp Beast Diplomat Character Card">
    <meta name="twitter:description" content="A character card demonstrating JavaScript objects and methods.">
    <meta name="twitter:image" content="Images/swampbeast.png">
    <meta name="twitter:url" content="https://joshbot8.github.io/wdd131/charactercard/index.html">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="/Images/swampbeast.png">
    
    <title>Character Card</title>

    <link rel="stylesheet" href="charactercardCSS.css">
</head>
<body>

<div class="card">
    <img id="characterImage" src="Images/swampbeast.png" alt="Swamp Beast Diplomat">

    <div class="name-section">
        <h1 id="characterName"></h1>
    </div>

    <div class="info-section">
        <p><strong>Class:</strong> <span id="characterClass"></span></p>
        <p><strong>Level:</strong> <span id="characterLevel"></span></p>
        <p><strong>Health:</strong> <span id="characterHealth"></span></p>

        <button onclick="attackCharacter()">Attacked</button>
        <button onclick="levelUpCharacter()">Level Up</button>
    </div>
</div>

<script src="charactercardJS.js"></script>

</body>
</html>
