<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="Interactive page with recipies that are nice and homey.">

    <title>Recipe Book</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="Browse delicious recipes including Apple Crisp and more.">
    <meta property="og:url" content="https://yourgithubusername.github.io/wdd131/recipes/">
    <meta property="og:image" content="images/social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="summary_large_image">

<body>

</header>

<main>

    <main>

        <section class="search">
            <input id="search" type="text" placeholder="Find a recipe">

</main>

        <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
